name: Deploy Web to Lambda (OpenNext)

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      stage:
        description: SST stage
        required: true
        default: production
      enable_domain_cutover:
        description: Switch pikmin.askans.app DNS to OpenNext frontend
        required: true
        type: boolean
        default: false

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  DEPLOY_STAGE: ${{ github.event.inputs.stage || 'production' }}
  ENABLE_DOMAIN_CUTOVER: ${{ github.event_name == 'push' && 'true' || github.event.inputs.enable_domain_cutover || 'false' }}
  S3_BUCKET_NAME: pikmin-postcard-images-041913718278-20260226
  S3_REGION: us-east-1
  S3_PUBLIC_BASE_URL: https://pikmin-postcard-images-041913718278-20260226.s3.us-east-1.amazonaws.com
  DDB_TABLE_PREFIX: pikmin-postcard
  OPENNEXT_DOMAIN_NAME: pikmin.askans.app
  OPENNEXT_ROUTE53_ZONE_ID: Z07732472U0GRGAK1E05W
  NEW_USER_APPROVAL_MODE: auto
  GEMINI_MODEL: gemini-2.5-flash

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Ensure DynamoDB tables and indexes
        run: |
          npm run ddb:provision -- --region "${{ env.AWS_REGION }}" --prefix "${{ env.DDB_TABLE_PREFIX }}"

      - name: Backfill postcard geo buckets
        run: |
          npm run ddb:backfill:geo

      - name: Load auth and AI secrets from GitHub Secrets
        env:
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          APP_JWT_SECRET: ${{ secrets.APP_JWT_SECRET }}
          GOOGLE_GENERATIVE_AI_API_KEY: ${{ secrets.GOOGLE_GENERATIVE_AI_API_KEY }}
        run: |
          missing=0
          for key in GOOGLE_CLIENT_ID GOOGLE_CLIENT_SECRET APP_JWT_SECRET GOOGLE_GENERATIVE_AI_API_KEY; do
            value="${!key}"
            if [ -z "$value" ]; then
              echo "::error::Missing required GitHub secret: $key"
              missing=1
            else
              echo "::add-mask::$value"
            fi
          done

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

          {
            echo "GOOGLE_CLIENT_ID=$GOOGLE_CLIENT_ID"
            echo "NEXT_PUBLIC_GOOGLE_CLIENT_ID=$GOOGLE_CLIENT_ID"
            echo "GOOGLE_CLIENT_SECRET=$GOOGLE_CLIENT_SECRET"
            echo "APP_JWT_SECRET=$APP_JWT_SECRET"
            echo "GOOGLE_GENERATIVE_AI_API_KEY=$GOOGLE_GENERATIVE_AI_API_KEY"
          } >> "$GITHUB_ENV"

      - name: Install SST providers
        run: npx sst install

      - name: Deploy OpenNext frontend
        env:
          CI: "true"
          OPENNEXT_ENABLE_DOMAIN: ${{ env.ENABLE_DOMAIN_CUTOVER }}
        run: |
          npx sst deploy --stage "${{ env.DEPLOY_STAGE }}" --yes

      - name: Print deployment outputs
        run: |
          npx sst state export --stage "${{ env.DEPLOY_STAGE }}" > /tmp/sst-state.json
          node -e "
            const fs = require('fs');
            const state = JSON.parse(fs.readFileSync('/tmp/sst-state.json', 'utf8'));
            const stack = (state?.latest?.resources || []).find((resource) => resource?.type === 'pulumi:pulumi:Stack');
            console.log(JSON.stringify(stack?.outputs || {}, null, 2));
          "
